<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDO Helper - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; }
        h1, h2, h3 { font-family: 'Poppins', sans-serif; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); }
        .modal-content { background-color: white; margin: 10% auto; border-radius: 20px; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <nav class="bg-white shadow-sm sticky top-0 z-50 px-4">
        <div class="container mx-auto py-4 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <svg class="w-7 h-7 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                <span class="text-xl font-bold text-slate-800">BDO Helper</span>
            </div>
            <div class="flex items-center space-x-4">
                <span id="userEmail" class="hidden md:block text-sm text-gray-500"></span>
                <button onclick="handleLogout()" class="text-sm font-semibold text-emerald-600">Wyloguj</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6 max-w-5xl">
        <div id="loadingState" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-emerald-600 mb-4"></div>
            <p class="text-gray-500">Ładowanie danych...</p>
        </div>

        <div id="dashboardContent" class="hidden">
            <section id="reports" class="mb-8">
                <div class="bg-white rounded-2xl shadow-sm p-6 border border-emerald-100">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-slate-800">Podsumowanie roczne</h2>
                        <span class="text-xs font-bold bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full uppercase">Rok <span id="currentYear"></span></span>
                    </div>
                    <div id="reportsSummary" class="grid gap-3">
                        </div>
                    <div class="mt-6 pt-6 border-t border-gray-100 flex justify-between items-end">
                        <span class="text-gray-400 font-medium">ŁĄCZNA MASA:</span>
                        <div class="text-right">
                            <div id="totalWeight" class="text-3xl font-bold text-emerald-600">0 kg</div>
                            <div id="totalWeightMg" class="text-xs text-gray-400 font-bold uppercase tracking-wider">0.000 Mg</div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="mb-8">
                <h2 class="text-lg font-bold text-slate-700 mb-4">Status limitów ewidencji</h2>
                <div class="grid md:grid-cols-3 gap-4">
                    <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                        <div class="text-[10px] font-black text-blue-500 uppercase mb-1">15 01 01</div>
                        <div class="text-sm font-bold text-slate-800 mb-3">Papier i tektura</div>
                        <div class="flex justify-between text-xs mb-2">
                            <span id="weight1" class="font-bold">0 kg</span>
                            <span class="text-gray-400">Limit: 500kg</span>
                        </div>
                        <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                            <div id="progressBar1" class="bg-emerald-500 h-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                        <div class="text-[10px] font-black text-purple-500 uppercase mb-1">15 01 02</div>
                        <div class="text-sm font-bold text-slate-800 mb-3">Tworzywa sztuczne</div>
                        <div class="flex justify-between text-xs mb-2">
                            <span id="weight2" class="font-bold">0 kg</span>
                            <span class="text-gray-400">Limit: 500kg</span>
                        </div>
                        <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                            <div id="progressBar2" class="bg-emerald-500 h-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                        <div class="text-[10px] font-black text-amber-500 uppercase mb-1">13 02 08</div>
                        <div class="text-sm font-bold text-slate-800 mb-3">Inne oleje silnikowe</div>
                        <div class="flex justify-between text-xs mb-2">
                            <span id="weight3" class="font-bold">0 kg</span>
                            <span class="text-gray-400">Alert: 100kg</span>
                        </div>
                        <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                            <div id="progressBar3" class="bg-emerald-500 h-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around py-3 z-50">
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="flex flex-col items-center text-emerald-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span class="text-[10px] mt-1 font-bold uppercase">Panel</span>
        </button>
        <button onclick="openAddEntryModal()" class="flex flex-col items-center text-gray-400">
            <div class="bg-emerald-600 text-white p-2 rounded-full -mt-8 shadow-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"/></svg>
            </div>
            <span class="text-[10px] mt-1 font-bold uppercase">Dodaj</span>
        </button>
        <a href="reports.html" class="py-3 flex flex-col items-center text-gray-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="text-[10px] mt-1 font-bold uppercase">Raporty</span>
        </button>
    </nav>

    <button onclick="openAddEntryModal()" class="hidden md:flex fixed bottom-8 right-8 w-16 h-16 bg-emerald-600 text-white rounded-full shadow-2xl items-center justify-center hover:scale-110 transition-transform z-50">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
    </button>

    <div id="addEntryModal" class="modal">
        <div class="modal-content mx-4 p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-slate-800">Nowy wpis ewidencji</h3>
                <button onclick="closeAddEntryModal()" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <form id="addEntryForm" onsubmit="handleAddEntry(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Kod odpadu</label>
                    <select id="wasteCode" required class="w-full border-2 border-gray-100 rounded-xl p-3 outline-none focus:border-emerald-500">
                        <option value="15 01 01">15 01 01 - Papier</option>
                        <option value="15 01 02">15 01 02 - Tworzywa</option>
                        <option value="13 02 08">13 02 08 - Oleje</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Masa [kg]</label>
                    <input type="number" id="wasteWeight" required step="0.1" placeholder="np. 12.5" class="w-full border-2 border-gray-100 rounded-xl p-3 outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Data przekazania</label>
                    <input type="date" id="entryDate" required class="w-full border-2 border-gray-100 rounded-xl p-3 outline-none focus:border-emerald-500">
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg mt-4">Zapisz w bazie</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'REPLACE_ME_URL';
        const SUPABASE_KEY = 'REPLACE_ME_KEY';
        let supabaseClient = null;

        // English comment: Safe initialization
        try {
            if (SUPABASE_URL !== 'REPLACE_ME_URL') {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch (e) { console.error("Config error", e); }

        const WASTE_LIMITS = {'15 01 01': 500, '15 01 02': 500, '13 02 08': 100};
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!supabaseClient) {
                alert("Błąd połączenia z bazą danych (Netlify keys).");
                return;
            }
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('currentYear').textContent = new Date().getFullYear();
            document.getElementById('entryDate').valueAsDate = new Date();
            loadDashboard();
        });

        async function loadDashboard() {
            const currentYear = new Date().getFullYear();
            const { data: entries, error } = await supabaseClient
                .from('waste_entries')
                .select('*')
                .eq('user_id', currentUser.id)
                .gte('entry_date', `${currentYear}-01-01`)
                .lte('entry_date', `${currentYear}-12-31`)
                .order('entry_date', { ascending: false });

            if (error) { console.error(error); return; }

            renderUI(entries || []);
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('dashboardContent').classList.remove('hidden');
        }

        function renderUI(entries) {
            const totals = {'15 01 01': 0, '15 01 02': 0, '13 02 08': 0};
            let grandTotal = 0;

            entries.forEach(e => {
                const w = parseFloat(e.weight_kg);
                if (totals[e.waste_code] !== undefined) totals[e.waste_code] += w;
                grandTotal += w;
            });

            // Render Annual Summary
            document.getElementById('reportsSummary').innerHTML = Object.entries(totals).map(([code, weight]) => `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl border border-gray-100">
                    <span class="font-bold text-slate-700">${code}</span>
                    <span class="font-bold text-emerald-600">${weight.toFixed(1)} kg</span>
                </div>
            `).join('');

            document.getElementById('totalWeight').textContent = `${grandTotal.toFixed(1)} kg`;
            document.getElementById('totalWeightMg').textContent = `${(grandTotal / 1000).toFixed(3)} Mg`;

            // Update Progress Bars
            Object.keys(totals).forEach((code, i) => {
                const w = totals[code];
                const limit = WASTE_LIMITS[code];
                const perc = Math.min((w / limit) * 100, 100);
                document.getElementById(`weight${i+1}`).textContent = `${w.toFixed(1)} kg`;
                const bar = document.getElementById(`progressBar${i+1}`);
                bar.style.width = `${perc}%`;
                if(perc > 80) bar.classList.replace('bg-emerald-500', 'bg-amber-500');
                if(perc >= 100) bar.classList.replace('bg-amber-500', 'bg-red-600');
            });
        }

        async function handleAddEntry(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Zapisywanie...';

            const { error } = await supabaseClient.from('waste_entries').insert([{
                user_id: currentUser.id,
                waste_code: document.getElementById('wasteCode').value,
                weight_kg: parseFloat(document.getElementById('wasteWeight').value),
                entry_date: document.getElementById('entryDate').value
            }]);

            if (error) { alert(error.message); btn.disabled = false; }
            else { closeAddEntryModal(); loadDashboard(); btn.disabled = false; btn.textContent = 'Zapisz w bazie'; }
        }

        function openAddEntryModal() { document.getElementById('addEntryModal').style.display = 'block'; }
        function closeAddEntryModal() { document.getElementById('addEntryModal').style.display = 'none'; }
        function scrollToReports() { document.getElementById('reports').scrollIntoView({behavior: 'smooth'}); }
        async function handleLogout() { await supabaseClient.auth.signOut(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
